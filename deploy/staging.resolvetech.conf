# Staging site: staging.resolvetech.biz
# For client review before production deployment

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name staging.resolvetech.biz;
    return 301 https://$host$request_uri;
}

# Staging site
server {
    listen 443 ssl http2;
    server_name staging.resolvetech.biz;

    ssl_certificate /etc/nginx/certs/resolvetech.biz/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/resolvetech.biz/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    root /var/www/resolvetech-staging;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache static assets (short cache for staging)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|pdf)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
