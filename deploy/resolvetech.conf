# Resolve Technology - Production
# Main site: resolvetech.biz
# Help portal: help.resolvetech.biz

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name resolvetech.biz www.resolvetech.biz help.resolvetech.biz;
    return 301 https://$host$request_uri;
}

# Main site: resolvetech.biz
server {
    listen 443 ssl http2;
    server_name resolvetech.biz www.resolvetech.biz;

    ssl_certificate /etc/nginx/certs/resolvetech.biz/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/resolvetech.biz/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/resolvetech;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}

# Help portal: help.resolvetech.biz
server {
    listen 443 ssl http2;
    server_name help.resolvetech.biz;

    ssl_certificate /etc/nginx/certs/resolvetech.biz/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/resolvetech.biz/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    root /var/www/resolvetech;

    location = / {
        try_files /help/index.html =404;
    }

    location / {
        try_files /help$uri $uri =404;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
